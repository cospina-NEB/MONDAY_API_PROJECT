$kind: http-request
name: Get Workspace Subscribers (Closed Workspaces)
method: POST
url: "{{monday_base_url}}"
order: 4000
headers:
  API-Version: 2024-07
  Authorization: "{{MONDAY_API_TOKEN}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "query": "query { workspaces(ids: [{{workspace_id}}]) { members: users_subscribers(limit: {{page_size}}, page: {{page}}) { id name email is_admin is_guest enabled created_at last_activity is_view_only teams { name } } } }"
    }
