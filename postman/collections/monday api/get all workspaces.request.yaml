$kind: http-request
name: get all workspaces
method: POST
url: "{{monday_base_url}}"
auth:
  type: noauth
order: 1000
headers:
  Authorization: "{{MONDAY_API_TOKEN}}"
  API-Version: 2024-07
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "query { workspaces(limit: 100) { id name kind } }"
    }
