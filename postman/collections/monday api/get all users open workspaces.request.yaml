$kind: http-request
name: 'Get All Users (Open Workspaces)'
method: POST
url: '{{monday_base_url}}'
order: 2000
headers:
  - key: Authorization
    value: '{{MONDAY_API_TOKEN}}'
  - key: API-Version
    value: '2024-07'
  - key: Content-Type
    value: 'application/json'
body:
  type: json
  content: |-
    {
      "query": "query { users(limit: {{page_size}}, page: {{page}}, kind: all) { id name email is_admin is_guest enabled created_at last_activity is_view_only teams { name } invited_by { id name email } } }"
    }
